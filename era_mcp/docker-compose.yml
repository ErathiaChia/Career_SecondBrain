# Era Vault "read" side on the Synology NAS.
#
# Postgres and Ollama already run as separate NAS containers. This compose file
# only rebuilds/recreates the OpenWebUI-compatible MCP/API container and reaches
# those existing services through their published NAS ports.

services:
  mcp-server:
    container_name: era-vault-mcp
    build:
      context: ..
      dockerfile: era_mcp/Dockerfile
    restart: always
    env_file:
      - ../.env
    environment:
      ERA_VAULT_DB_HOST: 192.168.50.50
      ERA_VAULT_DB_PORT: "15432"
      ERA_VAULT_DB_NAME: era_vault
      ERA_VAULT_DB_USER: era
      OLLAMA_BASE_URL: http://192.168.50.50:11434
      # Must match the indexer's embedding model + the vector(1024) schema.
      # Pull it on the NAS Ollama first: `ollama pull qwen3-embedding:0.6b`.
      EMBEDDING_MODEL: qwen3-embedding:0.6b

      # ---- Agent layer (/ask): query rewrite + rerank + answer synthesis ----
      # The heavy LLM runs on the M1 Max (the 6 GB NAS Ollama can't host it).
      # Set 192.168.50.60 to your Mac's LAN IP. Keep the Mac awake (caffeinate)
      # for warm latency; when it's unreachable /ask degrades to reranked chunks.
      LLM_PRIMARY_BASE_URL: http://192.168.50.60:11434
      LLM_PRIMARY_KIND: ollama            # or "openai_compat" for mlx_lm.server
      LLM_PRIMARY_MODEL: qwen3.5:9b-mlx
      LLM_PRIMARY_TIMEOUT: "30"
      LLM_FALLBACK_ENABLED: "1"           # OpenAI fallback (needs OPENAI_API_KEY in ../.env)
      # OPENAI_API_KEY / OPENAI_MODEL are read from ../.env

      # Reranker — Ollama has no rerank endpoint. Default "llm_score" reuses the
      # Mac LLM (no extra server). For best quality run Infinity/TEI on the Mac
      # and switch to "infinity" + RERANK_BASE_URL: http://192.168.50.60:7997
      RERANK_ENABLED: "1"
      RERANK_KIND: llm_score
      RERANK_MODEL: BAAI/bge-reranker-v2-m3

      QUERY_REWRITE_ENABLED: "1"
      HYDE_ENABLED: "0"
    ports:
      - "8808:8808"
