version: 1

# Customer registry: the single source of truth for known customers.
#
# Keys MUST equal the folder-derived code produced by
# FolderConstitution.customer_code() / relaxed_customer_code():
#   "02_Bank_Negara"            -> BANK_NEGARA
#   "12_TTSH - Eye Clinic"      -> TTSH_EYE_CLINIC  (spaces -> underscores)
#   "20_TemasekPoly_SmartContract" -> TEMASEKPOLY_SMARTCONTRACT
